name: ✨ 功能请求
description: 提议新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 file-preview 提出建议！清晰的功能描述有助于我们评估并实现你的需求。

        > 提交前请先 [搜索现有 Issue](https://github.com/wh131462/file-preview/issues?q=is%3Aissue) 确认你的建议尚未被提出。

  - type: dropdown
    id: package
    attributes:
      label: 影响范围
      description: 此功能应适用于哪些包？
      multiple: true
      options:
        - "@eternalheart/react-file-preview"
        - "@eternalheart/vue-file-preview"
        - "@eternalheart/file-preview-core"
        - 文档 / 示例
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 描述你遇到的实际问题或场景
      placeholder: 我在 ... 场景下，需要 ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望功能
      description: 你希望增加什么功能？尽量具体描述
      placeholder: 我希望能 ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他解决方案？为何不采用？

  - type: textarea
    id: example
    attributes:
      label: API 设计示例（可选）
      description: 如果有想法，可以给出期望的 API 调用示例
      render: tsx

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 此功能对你的重要程度
      options:
        - 低 - 锦上添花
        - 中 - 有用但有变通方案
        - 高 - 强烈需要
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意提交 PR 实现此功能
        - label: 我愿意协助测试此功能

  - type: checkboxes
    id: terms
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue 并确认没有重复
          required: true
        - label: 我已查阅 [在线文档](https://wh131462.github.io/file-preview) 并确认该功能未实现
          required: true
